<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside>
        <h2>Sha</h2>
        <nav>
            <button class="active" id="dashboard-btn">Dashboard</button>
            <button id="chat-btn">Chat</button>
            <button id="game-tools-btn">Game Tools</button>
            <button id="settings-btn">Settings</button>
        </nav>
    </aside>
    <main>
        <section id="dashboard">
            <h1>Dashboard</h1>
            <p>Welcome to Sha</p>
        </section>
        <section id="chat">
            <h1>Chat</h1>
            <div id="chat-container">
                <div id="messages"></div>
                <div id="chat-input">
                    <input type="text" id="message-input" placeholder="Ask Sha anything...">
                    <button id="send-btn">Send</button>
                </div>
                <p id="chat-warning">
                    Sha can make mistakes. Verify important information before making decisions.
                </p>
            </div>
</section>
        <section id="game-tools">
            <h1>Game Tools</h1>
        </section>
        <section id="settings">
            <h1>Settings</h1>
        </section>
    </main>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
